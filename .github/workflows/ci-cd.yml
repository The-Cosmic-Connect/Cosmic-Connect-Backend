name: Backend CI/CD

on:
  push:
    branches: [main, staging, dev]
  pull_request:
    branches: [main, staging, dev]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -r requirements.txt pytest httpx
      - run: pytest tests/ -v
        env:
          AWS_DEFAULT_REGION: ap-south-1
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test

  deploy:
    name: Deploy → ${{ github.ref_name }}
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ap-south-1

      - name: Set environment
        run: |
          if   [ "${{ github.ref_name }}" == "main"    ]; then echo "ENV=production" >> $GITHUB_ENV
          elif [ "${{ github.ref_name }}" == "staging" ]; then echo "ENV=staging"    >> $GITHUB_ENV
          else                                                  echo "ENV=dev"        >> $GITHUB_ENV
          fi

      - name: Install SAM CLI
        run: pip install aws-sam-cli

      - name: SAM build & deploy
        run: |
          sam build
          sam deploy \
            --stack-name backend-${{ env.ENV }} \
            --parameter-overrides Environment=${{ env.ENV }} \
            --capabilities CAPABILITY_IAM \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --s3-bucket thecosmicconnect-sam-${{ env.ENV }}

  notify:
    name: Slack Notify
    runs-on: ubuntu-latest
    needs: deploy
    if: always() && github.event_name == 'push'
    steps:
      - uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {"text": "${{ needs.deploy.result == 'success' && '✅' || '❌' }} *Backend `${{ github.ref_name }}`* — ${{ github.actor }}: ${{ github.event.head_commit.message }}"}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK